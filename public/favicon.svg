<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Newsprint cream background -->
  <rect width="32" height="32" fill="#F5F3EF"/>
  <!-- Top rule — thick, newspaper masthead bar -->
  <rect width="32" height="4" fill="#111111"/>
  <!-- Bottom rule — thin -->
  <rect y="29" width="32" height="3" fill="#111111"/>
  <!-- K letterform: stem + upper arm + lower arm (path-based, no font dep) -->
  <!-- Stem: x=[5,11], y=[5,28] -->
  <rect x="5" y="5" width="6" height="23" fill="#111111"/>
  <!-- Upper arm: diagonal from stem-right at mid (11,16.5) to top-right (26,5) -->
  <!-- Corners: upper-inner(9.5,14.5) upper-outer(24.5,5) outer-tip(27,7) lower-inner(12.5,18.5) -->
  <polygon points="9.5,14.5 24.5,5 27,7 12.5,18.5" fill="#111111"/>
  <!-- Lower arm: diagonal from stem-right at mid (11,16.5) to bottom-right (26,28) -->
  <!-- Corners: upper-inner(12.5,14.5) outer-tip(27,26) lower-outer(24.5,28) lower-inner(9.5,18.5) -->
  <polygon points="12.5,14.5 27,26 24.5,28 9.5,18.5" fill="#111111"/>
</svg>
